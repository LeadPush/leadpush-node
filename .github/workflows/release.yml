name: Release

on:
  push:
    branches:
      - main

permissions:
  contents: write
  id-token: write
  pull-requests: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
          package-manager-cache: false

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Detect release state
        id: release-state
        run: |
          node <<'NODE'
          const childProcess = require('node:child_process');
          const fs = require('node:fs');

          const changesetFiles = fs.existsSync('.changeset')
            ? fs.readdirSync('.changeset').filter((file) => file.endsWith('.md') && file !== 'README.md')
            : [];

          const currentVersion = JSON.parse(fs.readFileSync('package.json', 'utf8')).version;
          let previousVersion = '';

          try {
            const previousPackageJson = childProcess.execFileSync('git', ['show', 'HEAD^:package.json'], {
              encoding: 'utf8',
              stdio: ['ignore', 'pipe', 'ignore'],
            });

            previousVersion = JSON.parse(previousPackageJson).version;
          } catch {
            previousVersion = '';
          }

          const outputs = {
            has_changesets: String(changesetFiles.length > 0),
            current_version: currentVersion,
            previous_version: previousVersion,
            version_changed: String(previousVersion !== '' && currentVersion !== previousVersion),
          };

          fs.appendFileSync(
            process.env.GITHUB_OUTPUT,
            `${Object.entries(outputs)
              .map(([key, value]) => `${key}=${value}`)
              .join('\n')}\n`,
          );
          NODE

      - name: Typecheck
        run: pnpm run typecheck

      - name: Lint
        run: pnpm run lint

      - name: Test
        run: pnpm test

      - name: Build
        run: pnpm run build

      - name: Create release pull request
        if: steps.release-state.outputs.has_changesets == 'true'
        uses: changesets/action@v1
        with:
          title: Version Packages
          commit: Version Packages
          version: pnpm run version
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish to npm
        if: steps.release-state.outputs.has_changesets == 'false' && steps.release-state.outputs.version_changed == 'true'
        run: npm publish --access public

      - name: Create GitHub release
        if: steps.release-state.outputs.has_changesets == 'false' && steps.release-state.outputs.version_changed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ steps.release-state.outputs.current_version }}
        run: gh release create "v${VERSION}" --target "${GITHUB_SHA}" --title "v${VERSION}" --generate-notes
